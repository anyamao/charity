services:  # ✅ Ключ services: обязателен!
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: charity_db
    volumes:
      - charity_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --workers 2
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/charity_db
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: http://${VPS_IP}:3002,http://${VPS_IP}:8002
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - API_INTERNAL_URL=http://backend:8002
      - NODE_ENV=production
    ports:
      - "3002:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  charity_db_data:
